<div class="login-backdrop">
  <div class="login-modal">
    <h2>Iniciar sesión en GlowPic</h2>
    <p class="subtitle">Accede para guardar y organizar tus imágenes favoritas.</p>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Correo electrónico o usuario</label>
        <input id="email" type="text" [(ngModel)]="emailOrUsername" name="email" placeholder="Correo o usuario" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Contraseña" required>
          <span class="eye-icon">👁️</span>
        </div>
      </div>

      <button type="submit">Iniciar sesión</button>
    </form>

    <p class="register-text">
      ¿No tienes una cuenta?
      <a routerLink="/register">Regístrate</a>
    </p>
  </div>
</div>

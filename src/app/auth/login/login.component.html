<div class="login-container">
  <div class="container">
    <div class="login-content">
      <div class="login-header">
        <a href="/" class="login-title">GlowPic</a>
        <p class="login-subtitle">Ingresa con tu número de teléfono</p>
      </div>

      <div class="login-form">
        <form (ngSubmit)="onLogin()">
          <div class="login-form-group">
            <label for="phone" class="login-form-label">Número de teléfono</label>
            <input id="phone" type="tel" [(ngModel)]="phone" name="phone" class="login-form-input"
              placeholder="+57 300 1234567" required autocomplete="tel">
            <p class="login-hint">Usa el mismo número con el que hablas con el bot en Telegram.</p>
          </div>

          <p *ngIf="errorMessage" class="login-error">{{ errorMessage }}</p>

          <button type="submit" class="login-submit-btn">Ingresar</button>
        </form>
      </div>

      <div class="login-security">
        <div class="login-security-info">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
          </svg>
          <span class="login-security-text">
            Tu número solo se usa para vincular tu galería con tu cuenta de Telegram
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
